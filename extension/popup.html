<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 12px;
      color: #666;
    }
    input, textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    textarea {
      height: 60px;
      resize: vertical;
    }
    .settings {
      margin-bottom: 12px;
    }
    .settings label {
      font-weight: normal;
      color: #333;
    }
    button {
      width: 100%;
      padding: 8px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #1d4ed8;
    }
    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
    .status.success { color: #16a34a; }
    .status.error { color: #dc2626; }
  </style>
</head>
<body>
  <h1>📎 LLM Wiki Clipper</h1>

  <div class="settings">
    <div class="field">
      <label>Wiki Directory</label>
      <input type="text" id="wikiDir" placeholder="/path/to/your/wiki" />
    </div>
    <div class="field">
      <label>Port</label>
      <input type="number" id="port" value="19827" />
    </div>
  </div>

  <div class="field">
    <label>Title</label>
    <input type="text" id="title" />
  </div>

  <div class="field">
    <label>Tags (comma-separated)</label>
    <input type="text" id="tags" placeholder="web, article" />
  </div>

  <div class="field">
    <label>Notes</label>
    <textarea id="notes" placeholder="Optional notes about this page..."></textarea>
  </div>

  <button id="clipBtn">Clip to Wiki</button>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
